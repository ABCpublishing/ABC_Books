<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Page Not Found | ABC Books</title>
    <meta name="description" content="ABC Books - 404 Page Not Found">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/styles-responsive.css">
    <link rel="stylesheet" href="/css/pages.css">
    <style>
        .error-404 {
            text-align: center;
            padding: 100px 20px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-404 h1 {
            font-size: 8rem;
            color: #8B4513;
            margin: 0;
            line-height: 1;
            font-family: 'Playfair Display', serif;
        }
        .error-404 h2 {
            font-size: 2rem;
            color: #333;
            margin: 20px 0;
        }
        .error-404 p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/index.html" class="logo">
                    <img src="/images/logo.png" alt="ABC Books" class="logo-img">
                    <div class="logo-text">
                        <span class="logo-sub">BOOKS</span>
                    </div>
                </a>
            </div>
        </div>
    </header>

    <main class="page-main">
        <div class="container">
            <div class="error-404">
                <h1>404</h1>
                <h2>Page Not Found</h2>
                <p>The book or page you are looking for doesn't exist or has been moved.</p>
                <a href="/index.html" class="btn-home">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 ABC Books. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
